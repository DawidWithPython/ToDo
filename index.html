<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ToDo List</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>ToDo List</h1>

    <form id="taskForm">
      <input type="text" id="name" placeholder="Nazwa zadania" required>
      <textarea id="description" placeholder="Opis zadania" required></textarea>
      <input type="date" id="deadline" title="Data wykonania zadania" required>
      <button type="submit">Dodaj zadanie</button>
    </form>

    <div id="taskList"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
